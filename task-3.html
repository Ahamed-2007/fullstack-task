<!DOCTYPE html>
<html>
<head>
    <title>Ordered and Unordered List</title>
</head>

<body bgcolor="lightpink">

    <h2>Ordered List</h2>
    <ol>
        <li>Wake Up</li>
        <li>Study</li>
        <li>Sleep</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Orange</li>
    </ul>

</body>
</html>
